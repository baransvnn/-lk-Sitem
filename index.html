<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Pro Panel | Baran</title>
    <style>
        body { background: #000428; background: linear-gradient(to right, #004e92, #000428); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .player-card { background: linear-gradient(45deg, #ffd700, #b8860b); color: black; border-radius: 10px; width: 140px; padding: 10px; border: 3px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); position: relative; }
        .rating { font-size: 24px; font-weight: bold; position: absolute; top: 5px; left: 5px; }
        .position { font-size: 14px; font-weight: bold; position: absolute; top: 5px; right: 5px; background: black; color: white; padding: 2px 5px; border-radius: 4px; }
        .name { margin-top: 30px; font-weight: bold; font-size: 16px; }
        .power-up { background: red; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 10px; padding: 5px; font-weight: bold; }
        .special-edition { background: linear-gradient(45deg, #ff00ff, #00ffff) !important; animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #fff; } to { box-shadow: 0 0 20px #00ffff; } }
        .controls { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        select, input { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
    </style>
</head>
<body>

    <h1>⚽ eFOOTBALL KADRO PANELİ ⚽</h1>

    <div class="controls">
        <input type="text" id="pName" placeholder="Oyuncu Adı">
        <select id="pPos">
            <option value="KL">KL</option>
            <option value="STP">STP</option>
            <option value="GO">GO</option>
            <option value="SNT">SNT</option>
        </select>
        <button onclick="addPlayer()" style="padding: 10px; background: green; color: white; border: none; border-radius: 5px;">Kadroya Ekle</button>
    </div>

    <div class="card-container" id="team">
        </div>

    <script>
        function addPlayer() {
            const name = document.getElementById('pName').value;
            const pos = document.getElementById('pPos').value;
            if(!name) return;

            const team = document.getElementById('team');
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="rating" id="r-${name}">85</div>
                <div class="position">${pos}</div>
                <div class="name">${name}</div>
                <button class="power-up" onclick="levelUp('${name}')">SEVİYE ATLAT</button>
                <button class="power-up" style="background:blue;" onclick="specialEdition(this, '${name}')">ÖZEL BASIM</button>
            `;
            team.appendChild(card);
            document.getElementById('pName').value = "";
        }

        function levelUp(name) {
            const rElem = document.getElementById('r-' + name);
            let current = parseInt(rElem.innerText);
            if(current < 100) {
                rElem.innerText = current + 1;
            } else {
                alert("Maximum Seviyeye Ulaşıldı!");
            }
        }

        function specialEdition(btn, name) {
            const card = btn.parentElement;
            card.classList.toggle('special-edition');
            const rElem = document.getElementById('r-' + name);
            rElem.innerText = "101"; // Özel basım gücü!
        }
    </script>
</body>
</html>
