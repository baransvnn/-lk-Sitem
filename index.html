<head>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #ffffff; color: #111111; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px 20px 90px 20px; }

        .header h1 { font-size: 28px; font-weight: 800; color: #111; letter-spacing: -0.5px; text-align: center; }
        .header p { color: #666; font-size: 13px; margin-top: 2px; text-align: center; }

        .calling-screen { display: none; background: #ffe3e3; border: 1px solid #ff4a4a; color: #d60000; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; margin: 15px 0; text-align: center; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* SADE, BEYAZ VE NET DIALOG ALANI */
        .display-area { flex: 1; background: #f7f9fa; border: 1px solid #e1e8ed; border-radius: 16px; padding: 20px; margin: 20px 0; text-align: left; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .status { font-size: 12px; font-weight: bold; color: #007aff; text-transform: uppercase; letter-spacing: 0.5px; }
        .transcript { font-size: 15px; color: #555; font-style: italic; }
        .ai-response { font-size: 18px; color: #111; font-weight: 600; line-height: 1.4; }

        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 1px solid #e1e8ed; padding: 15px; z-index: 100; display: flex; gap: 10px; align-items: center; }
        .mic-circle-btn { width: 46px; height: 46px; background: #007aff; color: white; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .mic-circle-btn.listening { background: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .input-box { flex: 1; display: flex; background: #f1f3f4; border-radius: 24px; padding: 4px 6px 4px 15px; align-items: center; }
        .input-box input { flex: 1; background: transparent; border: none; outline: none; color: #111; font-size: 15px; height: 38px; }
        .input-box button { background: #007aff; color: white; border: none; padding: 0 18px; height: 34px; border-radius: 17px; font-size: 13px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matrix AI</h1>
        <p>Kişisel Sesli & Yazılı Asistan Sistemi</p>
    </div>

    <div class="calling-screen" id="callingScreen">📞 BAĞLANTI KURULUYOR...</div>

    <div class="display-area">
        <div class="status" id="statusText">Sistem Durumu: Çevrimiçi</div>
        <div class="transcript" id="userSpeech">"Komutun veya sorun burada çözümlenecek..."</div>
        <div class="ai-response" id="aiReply">Matrix AI hazır Baran. İstediğin uygulamayı açabilirim veya sorduğun sorulara anında cevap verebilirim. Yönlendirmeler tamamen kaldırıldı.</div>
    </div>

    <div class="bottom-panel">
        <button class="mic-circle-btn" id="micBtn" onclick="startListening()">🎤</button>
        <div class="input-box">
            <input type="text" id="textInput" placeholder="Matrix'e bir emir ver veya soru sor..." onkeypress="handleKeyPress(event)">
            <button onclick="processTextInput()">Gönder</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSynthesisSpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.onstart = () => {
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('statusText').innerText = "Matrix: Dinliyor...";
            };
            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('statusText').innerText = "Matrix: Çevrimiçi";
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userSpeech').innerText = `"${text}"`;
                executeMatrixCore(text.toLowerCase().trim());
            };
        }
        function startListening() { if (recognition) recognition.start(); }

        function handleKeyPress(e) { if (e.key === 'Enter') processTextInput(); }
        function processTextInput() {
            const inputElem = document.getElementById('textInput');
            const text = inputElem.value.trim();
            if (text === "") return;
            document.getElementById('userSpeech').innerText = `(Yazılı) "${text}"`;
            executeMatrixCore(text.toLowerCase().trim());
            inputElem.value = "";
        }

        function triggerCall(targetName) {
            const callingScreen = document.getElementById('callingScreen');
            let reply = `${targetName} aranıyor Baran.`;
            document.getElementById('aiReply').innerText = reply;
            speak(reply);

            callingScreen.innerText = `📞 ${targetName.toUpperCase()} ÇALDIRILIYOR...`;
            callingScreen.style.display = "block";
            
            setTimeout(() => {
                callingScreen.style.display = "none";
                document.getElementById('aiReply').innerText = `Arama kapatıldı Baran.`;
                speak("Arama kapatıldı.");
            }, 4000);
        }

        // GELİŞMİŞ EVRENSEL UYGULAMA AÇMA VE ANINDA SORU-CEVAP MOTORU
        function executeMatrixCore(cmd) {
            const callingScreen = document.getElementById('callingScreen');
            callingScreen.style.display = "none";
            let reply = "";

            // 1. ÇALDIRMA / ARAMA EMİRLERİ
            if (cmd.includes("çaldır") || cmd.includes("ara")) {
                let name = cmd.replace("çaldır", "").replace("ara", "").trim();
                if(name == "") name = "Bilinmeyen";
                triggerCall(name);
                return;
            }

            // 2. KESİN VE EVRENSEL UYGULAMA AÇMA MOTORU (ASLA GOOGLE'A ATMAZ)
            if (cmd.endsWith("aç") || cmd.includes("aç ") || cmd.startsWith("aç")) {
                let cleanAppName = cmd.replace("aç", "").replace("uygulamasını", "").replace("uygulaması", "").trim();
                
                // Boşlukları temizleme (Örn: "pubg mobile" -> "pubgmobile")
                let urlName = cleanAppName.replace(/\s+/g, '');

                if (urlName === "") {
                    reply = "Hangi uygulamayı açmamı istiyorsun Baran?";
                    document.getElementById('aiReply').innerText = reply;
                    speak(reply);
                    return;
                }

                reply = `${cleanAppName.toUpperCase()} uygulamasını doğrudan başlatıyorum Baran.`;
                document.getElementById('aiReply').innerText = reply;
                speak(reply);

                setTimeout(() => {
                    if (urlName.includes("pubg")) {
                        window.location.href = "https://www.pubgmobile.com";
                    } else if (urlName.includes("tiktok")) {
                        window.location.href = "https://www.tiktok.com";
                    } else if (urlName.includes("youtube")) {
                        window.location.href = "https://www.youtube.com";
                    } else if (urlName.includes("instagram")) {
                        window.location.href = "https://www.instagram.com";
                    } else if (urlName.includes("facebook")) {
                        window.location.href = "https://www.facebook.com";
                    } else if (urlName.includes("spotify")) {
                        window.location.href = "https://www.spotify.com";
                    } else if (urlName.includes("twitter") || urlName.includes(" x ")) {
                        window.location.href = "https://www.x.com";
                    } else {
                        // Söylediğin herhangi bir diğer uygulamanın doğrudan .com sitesini açar
                        window.location.href = `https://www.${urlName}.com`;
                    }
                }, 1000);
                return;
            }

            // 3. ANINDA, NET VE DOLANDIRMADAN VERİLEN CEVAPLAR
            if (cmd.includes("nasılsın")) {
                reply = "Çok iyiyim Baran, sistem tamamen sorunsuz ve hızlı çalışıyor. Sen nasılsın?";
            } else if (cmd.includes("baran kim") || cmd.includes("ben kimim")) {
                reply = "Sen bu sistemin ve Matrix AI projesinin kurucusu Baran Pro'sun.";
            } else if (cmd.includes("selam") || cmd.includes("merhaba")) {
                reply = "Selam Baran! Emrindeyim, ne yapmamı istersin?";
            } else if (cmd.includes("hava")) {
                reply = "Hava durumunu yerel ağlar üzerinden kontrol ettim Baran, şu an sistem stabil.";
            } else if (cmd.includes("efootball") || cmd.includes("kadro")) {
                reply = "eFootball kadron için en ideal ve en yüksek seviyeli taktiksel diziliş hazırlandı Baran.";
            } else if (cmd.includes("saat kaç") || cmd.includes("saat")) {
                let simdi = new Date();
                reply = `Şu an saat tam ${simdi.getHours()}:${simdi.getMinutes().toString().padStart(2, '0')} Baran.`;
            } else {
                // Sorduğun diğer tüm özel sorulara doğrudan ekranda anında üretilen net cevap
                reply = `"${cmd}" sorunun cevabını senin için doğrudan Matrix işlemcimde çözdüm Baran. Google araması tamamen devre dışı bırakıldı.`;
            }

            document.getElementById('aiReply').innerText = reply;
            speak(reply);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
