<html lang="tr">
<head>

    <title>Matrix AI</title>

    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #ffffff; color: #111111; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px 20px 90px 20px; }

        .header h1 { font-size: 28px; font-weight: 800; color: #111; letter-spacing: -0.5px; text-align: center; }
        .header p { color: #666; font-size: 13px; margin-top: 2px; text-align: center; }

        .calling-screen { display: none; background: #ffe3e3; border: 1px solid #ff4a4a; color: #d60000; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; margin: 15px 0; text-align: center; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* SADE VE BEYAZ DIALOG ALANI */
        .display-area { flex: 1; background: #f7f9fa; border: 1px solid #e1e8ed; border-radius: 16px; padding: 20px; margin: 20px 0; text-align: left; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .status { font-size: 12px; font-weight: bold; color: #007aff; text-transform: uppercase; letter-spacing: 0.5px; }
        .transcript { font-size: 15px; color: #555; font-style: italic; }
        .ai-response { font-size: 18px; color: #111; font-weight: 600; line-height: 1.4; }

        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 1px solid #e1e8ed; padding: 15px; z-index: 100; display: flex; gap: 10px; align-items: center; }
        .mic-circle-btn { width: 46px; height: 46px; background: #007aff; color: white; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .mic-circle-btn.listening { background: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .input-box { flex: 1; display: flex; background: #f1f3f4; border-radius: 24px; padding: 4px 6px 4px 15px; align-items: center; }
        .input-box input { flex: 1; background: transparent; border: none; outline: none; color: #111; font-size: 15px; height: 38px; }
        .input-box button { background: #007aff; color: white; border: none; padding: 0 18px; height: 34px; border-radius: 17px; font-size: 13px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matrix AI</h1>
        <p>Kişisel Sesli & Yazılı Asistan Sistemi</p>
    </div>

    <div class="calling-screen" id="callingScreen">📞 BAĞLANTI KURULUYOR...</div>

    <div class="display-area">
        <div class="status" id="statusText">Sistem Durumu: Çevrimiçi</div>
        <div class="transcript" id="userSpeech">"Sözlerin veya yazdıkların burada çözümlenecek..."</div>
        <div class="ai-response" id="aiReply">Matrix AI aktif Baran. Sorduğun her şeye buradan cevap vereceğim, tarayıcı yönlendirmeleri kapatıldı.</div>
    </div>

    <div class="bottom-panel">
        <button class="mic-circle-btn" id="micBtn" onclick="startListening()">🎤</button>
        <div class="input-box">
            <input type="text" id="textInput" placeholder="Matrix'e bir emir ver veya soru sor..." onkeypress="handleKeyPress(event)">
            <button onclick="processTextInput()">Gönder</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.onstart = () => {
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('statusText').innerText = "Matrix: Dinliyor...";
            };
            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('statusText').innerText = "Matrix: Çevrimiçi";
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userSpeech').innerText = `"${text}"`;
                executeMatrixCore(text.toLowerCase());
            };
        }
        function startListening() { if (recognition) recognition.start(); }

        function handleKeyPress(e) { if (e.key === 'Enter') processTextInput(); }
        function processTextInput() {
            const inputElem = document.getElementById('textInput');
            const text = inputElem.value.trim();
            if (text === "") return;
            document.getElementById('userSpeech').innerText = `(Yazılı) "${text}"`;
            executeMatrixCore(text.toLowerCase());
            inputElem.value = "";
        }

        function triggerCall(targetName) {
            const callingScreen = document.getElementById('callingScreen');
            let reply = `Sanal hat tetiklendi. ${targetName} şu an çaldırılıyor Baran...`;
            document.getElementById('aiReply').innerText = reply;
            speak(reply);

            callingScreen.innerText = `📞 ${targetName.toUpperCase()} ÇALDIRILIYOR...`;
            callingScreen.style.display = "block";
            
            setTimeout(() => {
                callingScreen.style.display = "none";
                document.getElementById('aiReply').innerText = `${targetName} araması sonlandırıldı.`;
                speak("Arama kapatıldı.");
            }, 5000);
        }

        function executeMatrixCore(cmd) {
            const callingScreen = document.getElementById('callingScreen');
            callingScreen.style.display = "none";
            let reply = "";

            // 1. ÇALDIRMA EMİRLERİ
            if (cmd.includes("çaldır") || cmd.includes("ara")) {
                let name = cmd.replace("çaldır", "").replace("ara", "").trim();
                if(name == "") name = "Bilinmeyen Numara";
                triggerCall(name);
                return;
            }

            // 2. TIKTOK AÇMA DÜZELTMESİ
            if (cmd.includes("aç")) {
                let appName = cmd.replace("aç", "").trim();
                
                if (appName.includes("tiktok")) {
                    reply = "TikTok sistemi başlatılıyor Baran. İyi seyirler.";
                    document.getElementById('aiReply').innerText = reply;
                    speak(reply);
                    setTimeout(() => { window.location.href = "https://www.tiktok.com"; }, 1200);
                    return;
                } else if (appName.includes("pubg")) {
                    reply = "PUBG Mobile sistem tetiklemesi başlatılıyor.";
                    document.getElementById('aiReply').innerText = reply;
                    speak(reply);
                    setTimeout(() => { window.location.href = "https://www.google.com/search?q=PUBG+Mobile"; }, 1200);
                    return;
                } else if (appName.includes("youtube")) {
                    reply = "YouTube açılıyor şef.";
                    document.getElementById('aiReply').innerText = reply;
                    speak(reply);
                    setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1200);
                    return;
                } else if (appName !== "") {
                    reply = `${appName.toUpperCase()} açılıyor.`;
                    document.getElementById('aiReply').innerText = reply;
                    speak(reply);
                    setTimeout(() => { window.location.href = `https://www.${appName}.com`; }, 1200);
                    return;
                }
            }

            // 3. GOOGLE'A GİTMEYEN SOHBET MOTORU
            if (cmd.includes("nasılsın")) {
                reply = "Çok iyiyim Baran, tamamen senin kontrolün altında çalışıyorum. Sen nasılsın?";
            } else if (cmd.includes("baran kim") || cmd.includes("ben kimim")) {
                reply = "Sen bu siber asistanın ve Matrix AI projesinin lideri Baran Pro'sun.";
            } else if (cmd.includes("selam") || cmd.includes("merhaba")) {
                reply = "Selam Baran! Matrix yerel veritabanı aktif, seni dinliyorum.";
            } else if (cmd.includes("hava") || cmd.includes("neden")) {
                reply = "Bu harika sorunun cevabını senin için arka planda analiz ediyorum Baran. Gerçekten derin bir konu.";
            } else if (cmd.includes("efootball") || cmd.includes("kadro") || cmd.includes("oyun")) {
                reply = "eFootball veritabanı inceleniyor. Baran Pro'nun kadrosu için en yüksek taktiksel düzen kuruluyor şef.";
            } else {
                let alternatifCevaplar = [
                    `"${cmd}" sorgunu yerel işlemcilerimde analiz ettim Baran. Google'a gitmeden doğrudan buradan yanıt veriyorum.`,
                    `Harika bir konuya değindin şef. "${cmd}" talebini siber hafızama kaydettim, sistem tamamen bağımsız çalışıyor!`,
                    `Anlaşıldı Baran Pro. "${cmd}" emrini aldım, tarayıcıyı terk etmeden işlemi buradaki ekranda yürütüyorum.`
                ];
                reply = alternatifCevaplar[Math.floor(Math.random() * alternatifCevaplar.length)];
            }

            document.getElementById('aiReply').innerText = reply;
            speak(reply);
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
