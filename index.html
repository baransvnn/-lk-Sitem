<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream | Baran Dizi Platformu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0e17; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        /* ÜST MENÜ (NAVBAR) */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(10, 14, 23, 0.95);
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            border-bottom: 1px solid #1a2333;
        }
        .logo { font-size: 26px; font-weight: 900; color: #e50914; letter-spacing: -1px; }
        .logo span { color: #00ffcc; }
        .menu-items { display: flex; gap: 20px; list-style: none; font-size: 14px; color: #bbb; }
        .menu-items li { cursor: pointer; transition: 0.3s; }
        .menu-items li:hover { color: #fff; }

        /* ÖNE ÇIKAN BÜYÜK DİZİ (HERO BANNER) */
        .hero {
            height: 55vh; background: linear-gradient(to top, #0a0e17 10%, rgba(10,14,23,0) 80%), url('https://picsum.photos/id/1015/1200/600') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 0 5% 40px 5%; margin-top: 60px;
        }
        .hero-title { font-size: 38px; font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-meta { display: flex; gap: 15px; font-size: 13px; color: #00ffcc; margin-bottom: 15px; font-weight: bold; }
        .hero-meta span.imdb { background: #f5c518; color: #000; padding: 2px 6px; border-radius: 4px; }
        .hero-desc { max-width: 500px; font-size: 14px; color: #cccccc; line-height: 1.5; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .play-btn { background: #fff; color: #000; border: none; padding: 10px 25px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; display: inline-block; width: fit-content; }
        .play-btn:hover { background: #e50914; color: #fff; }

        /* DİZİ LİSTESİ SATIRI */
        .content-section { padding: 30px 5% 0 5%; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #fff; border-left: 4px solid #e50914; padding-left: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .show-card { background: #131a26; border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 0.3s, border 0.3s; border: 1px solid #1c273a; }
        .show-card:hover { transform: scale(1.05); border-color: #00ffcc; }
        .show-img { width: 100%; height: 200px; object-fit: cover; }
        .show-info { padding: 10px; }
        .show-name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .show-rating { font-size: 11px; color: #f5c518; font-weight: bold; }

        /* SİNEMA SEYRETME PANELİ (MODAL) */
        .video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 700px; background: #131a26; border-radius: 8px; border: 1px solid #00ffcc; padding: 15px; position: relative; }
        .close-modal { position: absolute; top: -35px; right: 0; color: #fff; font-size: 24px; cursor: pointer; font-weight: bold; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 4px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Vibe<span>Stream</span></div>
        <ul class="menu-items">
            <li>Ana Sayfa</li>
            <li>Diziler</li>
            <li>Trendler</li>
        </ul>
    </nav>

    <div class="hero" id="heroBanner">
        <h1 class="hero-title" id="heroTitle">Kurtlar Vadisi</h1>
        <div class="hero-meta">
            <span class="imdb">IMDb 9.1</span>
            <span>2003</span>
            <span>97 Bölüm</span>
        </div>
        <p class="hero-desc" id="heroDesc">"Bu bir mafya dizisidir." Türkiye'nin gelmiş geçmiş en derin ve unutulmaz efsanesi şimdi tüm bölümleriyle tek parça.</p>
        <button class="play-btn" onclick="openPlayer('dQw4w9WgXcQ')">▶ Hemen İzle</button>
    </div>

    <div class="content-section">
        <div class="section-title">Popüler Diziler</div>
        <div class="grid-container" id="showsGrid"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayer()">✕ Kapat</span>
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            <h3 id="modalVideoTitle" style="margin-top: 15px; font-size: 16px; color: #00ffcc;">Dizi İzleniyor...</h3>
        </div>
    </div>

    <script>
        // Platformdaki Dizilerin Listesi (Buraya istediğin diziyi ekleyebilirsin)
        const showsData = [
            { name: "Kurtlar Vadisi", year: 2003, imdb: "9.1", desc: '"Bu bir mafya dizisidir." Türkiye\'nin gelmiş geçmiş en derin efsanesi tüm bölümleriyle burada.', img: "https://picsum.photos/id/1015/300/400", videoId: "dQw4w9WgXcQ" },
            { name: "Breaking Bad", year: 2008, imdb: "9.5", desc: "Kimya öğretmeninin imparatorluğa dönüşen tehlikeli ve karanlık hikayesi.", img: "https://picsum.photos/id/1069/300/400", videoId: "HhesaQXLuRY" },
            { name: "Prison Break", year: 2005, imdb: "8.3", desc: "Kardeşini hapisten kaçırmak için tüm vücuduna haritayı dövmeleten dahi bir adam.", img: "https://picsum.photos/id/1043/300/400", videoId: "AL9zLctatJa" },
            { name: "Game of Thrones", year: 2011, imdb: "9.2", desc: "Taht kavgaları, ejderhalar ve duvarın arkasındaki gizemli tehlike.", img: "https://picsum.photos/id/1022/300/400", videoId: "KPLWWIOCOOQ" }
        ];

        // Dizileri Ekrana Dizme
        function loadShows() {
            const grid = document.getElementById('showsGrid');
            grid.innerHTML = "";
            
            showsData.forEach((show, index) => {
                grid.innerHTML += `
                    <div class="show-card" onclick="selectShow(${index})">
                        <img src="${show.img}" class="show-img">
                        <div class="show-info">
                            <div class="show-name">${show.name}</div>
                            <div class="show-rating">⭐ ${show.imdb}</div>
                        </div>
                    </div>
                `;
            });
        }

        // Alttaki dizilerden birine tıklayınca yukarıdaki büyük afişi değiştirir
        function selectShow(index) {
            const show = showsData[index];
            document.getElementById('heroTitle').innerText = show.name;
            document.getElementById('heroDesc').innerText = show.desc;
            
            // Meta bilgilerini ve oynat butonunu güncelle
            const hero = document.getElementById('heroBanner');
            hero.style.backgroundImage = `linear-gradient(to top, #0a0e17 10%, rgba(10,14,23,0) 80%), url('${show.img}')`;
            
            const btn = hero.querySelector('.play-btn');
            btn.onclick = () => openPlayer(show.videoId, show.name);
        }

        // Sinema Modunu Açma (Video Başlatma)
        function openPlayer(videoId, title) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            document.getElementById('modalVideoTitle').innerText = title + " - 1. Bölüm İzleniyor";
            
            // YouTube gömme linkini aktifleştiriyoruz
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            modal.style.display = 'flex';
        }

        // Sinema Modunu Kapatma
        function closePlayer() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            player.src = ""; // Videoyu durdurmak için adresi sıfırlıyoruz
            modal.style.display = 'none';
        }

        window.onload = loadShows;
    </script>
</body>
</html>
