<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Real Squad Panel | Baran</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .stadyum { background: linear-gradient(to bottom, #051329, #000); min-height: 100vh; padding: 20px; }
        
        /* ANALİZ PANELİ */
        .dashboard {
            background: rgba(8, 15, 29, 0.9);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .dash-item { font-size: 16px; font-weight: bold; }
        .dash-item span { color: #00ffcc; font-size: 22px; display: block; margin-top: 5px;}

        /* KART ALANI */
        .card-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .card {
            width: 135px; height: 210px; background: #111;
            border-radius: 12px; border: 2px solid #333;
            position: relative; transition: 0.3s; cursor: pointer;
        }
        
        /* KART TÜRLERİ */
        .card.bigtime { border: 2px solid #ffd700; box-shadow: 0 0 12px #ffd700; background: linear-gradient(135deg, #b8860b, #111); }
        .card.epic { border: 2px solid #00ffcc; box-shadow: 0 0 12px #00ffcc; background: linear-gradient(135deg, #005f73, #111); }
        .card.showtime { border: 2px solid #ff00ff; box-shadow: 0 0 12px #ff00ff; background: linear-gradient(135deg, #7209b7, #111); }

        .rating-top { position: absolute; top: 5px; left: 8px; font-size: 24px; font-weight: 900; color: #fff; z-index: 5; text-shadow: 2px 2px #000; }
        .pos-badge { position: absolute; top: 32px; left: 8px; background: rgba(0,0,0,0.7); color: #ffd700; font-size: 10px; padding: 1px 4px; font-weight: bold; border-radius: 3px; z-index: 5; }
        
        .player-img { width: 100%; height: 70%; object-fit: cover; border-radius: 12px 12px 0 0; opacity: 0.8; }
        .card-name { background: rgba(0,0,0,0.9); padding: 6px; font-weight: bold; font-size: 11px; border-radius: 0 0 12px 12px; border-top: 1px solid #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* İSTATİSTİK PANELİ */
        .stats-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .stats-content {
            width: 90%; max-width: 400px; background: #080f1d;
            border: 2px solid #ffd700; border-radius: 15px; padding: 20px; text-align: left;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #152238; font-size: 14px;}
        .stat-val { color: #fff; font-weight: bold; }
        .stat-boosted { color: #00ffcc !important; text-shadow: 0 0 5px #00ffcc; }

        button { background: #ffd700; color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .close-btn { background: #333; color: white; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="stadyum">
    <h1 style="color:#fff; text-shadow: 2px 2px #000; margin-bottom: 5px;">⚽ eFOOTBALL BARAN PRO PANEL ⚽</h1>
    <p style="color:#aaa; margin-top: 0; font-size: 14px;">Kadronu Kur, Analiz Et ve Özel Basımları Al</p>
    
    <div class="dashboard">
        <div class="dash-item">Kolektif Güç <span id="teamPower">3010</span></div>
        <div class="dash-item">Önerilen Diziliş <span id="suggestedFormation">Analiz Ediliyor...</span></div>
        <button onclick="loadDreamTeam()" style="background: #2ecc71; color: white; padding: 12px;">🚀 TÜM KADROYU KOY</button>
    </div>

    <div class="card-box" id="container"></div>
</div>

<div id="statsPanel" class="stats-overlay">
    <div class="stats-content">
        <h2 id="modalName" style="color:#fff; text-align:center; margin-top:0;">OYUNCU</h2>
        <h4 style="color:#aaa; text-align:center; margin-top:-10px;" id="modalCardType">KART TÜRÜ</h4>
        <div id="statsList"></div>
        <button id="specialBtn" style="width: 100%; margin-top: 15px;">🔥 ÖZEL BASIMI AKTİVET 🔥</button>
        <button class="close-btn" onclick="closeStats()">KAPAT</button>
    </div>
</div>

<script>
    // Gerçekçi Kadro Veritabanı
    const dreamTeamData = [
        { name: "Diego Forlán", pos: "SNT", base: 96, max: 102, type: "epic", stats: { "Genel Derece": 96, "Ofansif Farkındalık": 88, "Top Kontrolü": 82, "Hız": 87, "Bitiricilik": 90 } },
        { name: "Bernardo Silva", pos: "OOS", base: 95, max: 101, type: "showtime", stats: { "Genel Derece": 95, "Ofansif Farkındalık": 80, "Top Kontrolü": 91, "Top Sürme": 88, "Sıkı Top Tutma": 89 } },
        { name: "Leroy Sané", pos: "GÖ", base: 94, max: 101, type: "showtime", stats: { "Genel Derece": 94, "Top Kontrolü": 83, "Top Sürme": 89, "Hız": 94, "Hızlanma": 92 } },
        { name: "Samuel Eto'o", pos: "SNT", base: 96, max: 103, type: "bigtime", stats: { "Genel Derece": 96, "Ofansif Farkındalık": 87, "Top Kontrolü": 91, "Top Sürme": 92, "Bitiricilik": 88 } },
        { name: "Gareth Bale", pos: "RWF", base: 97, max: 103, type: "bigtime", stats: { "Genel Derece": 97, "Ofansif Farkındalık": 86, "Top Kontrolü": 87, "Top Sürme": 87, "Bitiricilik": 88 } },
        { name: "Zico", pos: "OOS", base: 95, max: 102, type: "epic", stats: { "Genel Derece": 95, "Ofansif Farkındalık": 84, "Top Kontrolü": 92, "Top Sürme": 90, "Bitiricilik": 83 } },
        { name: "Lionel Messi", pos: "RWF", base: 98, max: 104, type: "bigtime", stats: { "Genel Derece": 98, "Ofansif Farkındalık": 85, "Top Kontrolü": 85, "Top Sürme": 87, "Bitiricilik": 86 } },
        { name: "A. Del Piero", pos: "OOS", base: 97, max: 103, type: "epic", stats: { "Genel Derece": 97, "Ofansif Farkındalık": 85, "Top Kontrolü": 83, "Top Sürme": 87, "Bitiricilik": 85 } },
        { name: "G. Batistuta", pos: "SNT", base: 96, max: 102, type: "epic", stats: { "Genel Derece": 96, "Ofansif Farkındalık": 86, "Top Kontrolü": 82, "Hız": 84, "Bitiricilik": 91 } },
        { name: "Victor Osimhen", pos: "SNT", base: 96, max: 102, type: "showtime", stats: { "Genel Derece": 96, "Ofansif Farkındalık": 89, "Top Kontrolü": 78, "Hız": 93, "Bitiricilik": 88 } },
        { name: "Nihat Kahveci", pos: "SNT", base: 95, max: 101, type: "epic", stats: { "Genel Derece": 95, "Ofansif Farkındalık": 89, "Top Kontrolü": 80, "Hız": 88, "Bitiricilik": 87 } }
    ];

    let activePlayers = {};

    function loadDreamTeam() {
        const container = document.getElementById('container');
        container.innerHTML = "";
        activePlayers = {};
        
        dreamTeamData.forEach((player, index) => {
            const id = 'p-' + index;
            activePlayers[id] = JSON.parse(JSON.stringify(player));
            
            container.innerHTML += `
                <div class="card" id="${id}" onclick="openStats('${id}')">
                    <div class="rating-top" id="rate-${id}">${player.base}</div>
                    <div class="pos-badge">${player.pos}</div>
                    <img src="https://via.placeholder.com/135xl170/111/fff?text=${player.name.split(' ')[1] || player.name}" class="player-img">
                    <div class="card-name">${player.name.toUpperCase()}</div>
                </div>
            `;
        });
        updateDashboard();
    }

    function openStats(id) {
        const p = activePlayers[id];
        document.getElementById('modalName').innerText = p.name.toUpperCase();
        document.getElementById('modalCardType').innerText = p.type.toUpperCase() + " CARD SPECIFICATIONS";
        
        const list = document.getElementById('statsList');
        list.innerHTML = "";
        
        for(let s in p.stats) {
            let isBoosted = p.stats[s] > dreamTeamData[id.split('-')[1]].stats[s];
            list.innerHTML += `
                <div class="stat-row">
                    <span>${s}</span>
                    <span class="stat-val ${isBoosted ? 'stat-boosted' : ''}">${p.stats[s]}</span>
                </div>`;
        }

        document.getElementById('statsPanel').style.display = 'flex';
        const btn = document.getElementById('specialBtn');
        btn.innerText = `🔥 ÖZEL BASIM YAP (${p.max}) 🔥`;
        btn.onclick = () => makeEpic(id);
    }

    function makeEpic(id) {
        const p = activePlayers[id];
        const cardElem = document.getElementById(id);
        
        if(!cardElem.classList.contains(p.type)) {
            cardElem.classList.add(p.type);
            p.stats["Genel Derece"] = p.max;
            document.getElementById('rate-' + id).innerText = p.max;

            for(let s in p.stats) {
                if(s !== "Genel Derece") p.stats[s] += 4; 
            }
            updateDashboard();
        }
        closeStats();
    }

    function updateDashboard() {
        let total = 0;
        let count = 0;
        let sntCount = 0;

        for(let id in activePlayers) {
            total += activePlayers[id].stats["Genel Derece"];
            count++;
            if(activePlayers[id].pos === "SNT") sntCount++;
        }

        // Kolektif Güç Hesaplama (Gerçekçi çarpan ile)
        if(count > 0) {
            let collectivePower = Math.floor((total / count) * 11) + 195;
            document.getElementById('teamPower').innerText = collectivePower;
            
            // Dinamik Diziliş Önerisi
            if(sntCount >= 4) {
                document.getElementById('suggestedFormation').innerText = "4-2-2-2 (Ofansif)";
            } else {
                document.getElementById('suggestedFormation').innerText = "4-3-3 (Kanat Hücumu)";
            }
        }
    }

    function closeStats() { document.getElementById('statsPanel').style.display = 'none'; }
    
    // Sayfa açılınca otomatik yükle
    window.onload = loadDreamTeam;
</script>

</body>
</html>
