<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Baran Dream Team</title>
    <style>
        body { 
            background: #0d0d1a; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
        }
        .header { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); padding: 15px; border-radius: 10px; border-bottom: 3px solid #f3ae1a; }
        
        .setup-panel { background: rgba(255,255,255,0.05); padding: 15px; margin: 15px auto; max-width: 500px; border-radius: 10px; border: 1px solid #333; }
        input, select, button { padding: 8px; margin: 5px; border-radius: 5px; border: none; font-weight: bold; }
        input[type="text"] { width: 60%; background: #000; color: #fff; border: 1px solid #f3ae1a; }
        .add-btn { background: #2ecc71; color: white; cursor: pointer; }

        /* SÜPER KADRO ALANI */
        .squad-field {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: radial-gradient(circle, #1b4d3e 0%, #0a2f1d 100%);
            border: 3px solid #2ecc71;
            border-radius: 20px;
            margin-top: 20px;
            min-height: 400px;
        }

        /* GERÇEKÇİ EFOOTBALL KART TASARIMI */
        .efootball-card {
            width: 140px;
            height: 200px;
            background: linear-gradient(135deg, #1f4068, #162447);
            border-radius: 12px;
            border: 2px solid #444;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            overflow: hidden;
        }

        .card-rating {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 26px;
            font-weight: 900;
            color: #00ffcc;
            z-index: 10;
            text-shadow: 2px 2px #000;
        }

        .card-pos {
            position: absolute;
            top: 35px;
            left: 8px;
            background: #000;
            color: #00ffcc;
            font-size: 11px;
            padding: 1px 4px;
            font-weight: bold;
            border-radius: 3px;
            z-index: 10;
        }

        .player-photo {
            width: 100%;
            height: 70%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.8;
        }

        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .p-name { font-size: 13px; font-weight: bold; color: #fff; margin: 0; text-transform: uppercase; }
        .p-skill { font-size: 9px; color: #999; margin: 2px 0 0 0; }

        /* VIDEODAKI GIBI PARIL PARIL PARLAYAN ÖZEL BASIM MODU */
        .epic-boost {
            border: 2px solid #ffd700 !important;
            background: linear-gradient(135deg, #8a2387, #e94057, #f27121) !important;
            animation: epicGlow 1.5s infinite alternate;
            transform: scale(1.03);
        }
        .epic-boost .card-rating { color: #ffd700 !important; font-size: 29px; }
        .epic-boost .p-skill { color: #ffd700 !important; font-weight: bold; }

        @keyframes epicGlow {
            from { box-shadow: 0 0 10px #ffd700; filter: brightness(1); }
            to { box-shadow: 0 0 25px #ff00ff; filter: brightness(1.2); }
        }

        .card-btns {
            position: absolute;
            top: 60px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 20;
            opacity: 0;
            transition: 0.2s;
        }
        .efootball-card:hover .card-btns { opacity: 1; background: rgba(0,0,0,0.7); height: 50%; border-radius: 5px; }
        .action-btn { font-size: 9px; padding: 3px; background: #f3ae1a; color: black; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚽ BARAN eFOOTBALL KADRO SİHİRBAZI ⚽</h1>
    <p>Videodaki Gibi Efsane Kartlarını Kendin Tasarla!</p>
</div>

<div class="setup-panel">
    <h3>Yeni Oyuncu Ekle</h3>
    <input type="text" id="playerName" placeholder="Örn: Messi, Neymar, Uğurcan...">
    <select id="playerPos">
        <option value="SNT">SNT (CF)</option>
        <option value="OOS">OOS (AMF)</option>
        <option value="Kanat">LWF / RWF</option>
        <option value="STP">STP (CB)</option>
        <option value="KL">KL (GK)</option>
    </select>
    <select id="playerSkill">
        <option value="Striker's Instinct">Striker's Instinct</option>
        <option value="Technique">Technique</option>
        <option value="Crossing">Crossing</option>
        <option value="Agility">Agility</option>
    </select>
    <br><br>
    <label style="background:#555; padding:6px; border-radius:5px; cursor:pointer; font-size:12px;">
        Kart Resmi Seç <input type="file" accept="image/*" id="playerImgFile" style="display:none;" onchange="previewImgName()">
    </label>
    <span id="fileNameDisplay" style="font-size:11px; color:#aaa; margin-left:5px;"></span>
    <br><br>
    <button class="add-btn" onclick="createNewPlayer()">KADROYA YERLEŞTİR</button>
</div>

<h3 style="color:#2ecc71;">SAHA / KADRO GÖRÜNÜMÜ</h3>
<div class="squad-field" id="squadField">
    </div>

<div style="margin:40px 0; font-size:12px; color:#555;">eFootball Card Creator v3 - Baran Pro</div>

<script>
    let currentImgUrl = "";

    function previewImgName() {
        const fileInput = document.getElementById('playerImgFile');
        if(fileInput.files.length > 0) {
            document.getElementById('fileNameDisplay').innerText = "Resim Seçildi! ✅";
            currentImgUrl = URL.createObjectURL(fileInput.files[0]);
        }
    }

    function createNewPlayer() {
        const name = document.getElementById('playerName').value;
        const pos = document.getElementById('playerPos').value;
        const skill = document.getElementById('playerSkill').value;
        const field = document.getElementById('squadField');

        if(!name) { alert("Lütfen bir oyuncu adı yaz!"); return; }

        const cardId = 'card-' + Date.now();
        // Varsayılan boş resim veya yüklenen resim
        const imgPath = currentImgUrl ? currentImgUrl : 'https://via.placeholder.com/140x140/222/fff?text=eFootball';

        const cardHTML = `
            <div class="efootball-card" id="${cardId}">
                <div class="card-rating" id="rating-${cardId}">94</div>
                <div class="card-pos">${pos}</div>
                <img class="player-photo" src="${imgPath}">
                <div class="card-btns">
                    <button class="action-btn" onclick="boostRating('${cardId}')">REYTING +1</button>
                    <button class="action-btn" style="background:purple; color:white;" onclick="triggerEpic('${cardId}')">ÖZEL BASIM (108)</button>
                    <button class="action-btn" style="background:red; color:white;" onclick="document.getElementById('${cardId}').remove()">SİL</button>
                </div>
                <div class="card-footer">
                    <p class="p-name">${name}</p>
                    <p class="p-skill">${skill}</p>
                </div>
            </div>
        `;

        field.innerHTML += cardHTML;
        
        // Formu temizle
        document.getElementById('playerName').value = "";
        document.getElementById('fileNameDisplay').innerText = "";
        currentImgUrl = "";
    }

    function boostRating(id) {
        const rateElem = document.getElementById('rating-' + id);
        let current = parseInt(rateElem.innerText);
        if(current < 110) rateElem.innerText = current + 1;
    }

    function triggerEpic(id) {
        const card = document.getElementById(id);
        const rateElem = document.getElementById('rating-' + id);
        card.classList.toggle('epic-boost');
        
        if(card.classList.contains('epic-boost')) {
            // Rastgele 105 - 110 arası efsane bir güç veriyoruz videodaki gibi!
            const randomEpicRating = Math.floor(Math.random() * (110 - 105 + 1)) + 105;
            rateElem.innerText = randomEpicRating;
        } else {
            rateElem.innerText = "94";
        }
    }
</script>

</body>
</html>
