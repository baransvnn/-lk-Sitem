<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Baran Master Edition</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .stadyum { background: linear-gradient(to bottom, #001f3f, #000); min-height: 100vh; padding: 20px; }
        
        /* KART ALANI */
        .card-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card {
            width: 160px; height: 250px; background: #1a1a1a;
            border-radius: 15px; border: 2px solid #333;
            position: relative; transition: 0.4s; cursor: pointer;
        }
        .card.epic { border: 2px solid #ffd700; box-shadow: 0 0 20px #ffd700; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .rating-top { position: absolute; top: 10px; left: 10px; font-size: 30px; font-weight: 900; color: #ffd700; z-index: 5; }
        .player-img { width: 100%; height: 70%; object-fit: cover; border-radius: 15px 15px 0 0; }
        .card-name { background: rgba(0,0,0,0.8); padding: 10px; font-weight: bold; border-radius: 0 0 15px 15px; }

        /* İSTATİSTİK PANELİ (VİDEODAKİ GİBİ) */
        .stats-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .stats-content {
            width: 90%; max-width: 400px; background: #0b0e18;
            border: 2px solid #ffd700; border-radius: 20px; padding: 20px; text-align: left;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 14px;}
        .stat-val { color: #ffd700; font-weight: bold; }

        button { background: #ffd700; color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer;}
        .close-btn { background: red; color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="stadyum">
    <h1 style="color:#ffd700; text-shadow: 2px 2px #000;">⚽ eFOOTBALL ÖZEL BASIM MERKEZİ ⚽</h1>
    <p>Kendi Efsanevi Gelişim Taktiğini Kodla!</p>
    <input type="text" id="pName" placeholder="Oyuncu Adı (Örn: Oshimen, Messi)" style="padding:10px; border-radius:5px; width:220px;">
    <button onclick="addCard()" style="width:auto; padding:10px 20px; background:#2ecc71; color:white;">KART OLUŞTUR</button>

    <div class="card-box" id="container"></div>
</div>

<div id="statsPanel" class="stats-overlay">
    <div class="stats-content">
        <h2 id="modalName" style="color:#ffd700; text-align:center;">OYUNCU</h2>
        <h3 style="color:#aaa; text-align:center; font-size:14px;">OYUNCU AYRINTILARI</h3>
        <div id="statsList"></div>
        <button id="specialBtn">🔥 ÖZEL BASIM YAP (110) 🔥</button>
        <button class="close-btn" onclick="closeStats()">KAPAT</button>
    </div>
</div>

<script>
    let players = {};

    function addCard() {
        const name = document.getElementById('pName').value;
        if(!name) return;
        const id = 'id' + Date.now();
        players[id] = { 
            name: name, 
            rating: 90, 
            stats: { 
                "Genel Derece": 90,
                "Ofansif Farkındalık": 85, 
                "Top Kontrolü": 82, 
                "Top Sürme": 88, 
                "Sıkı Top Tutma": 84,
                "Hız": 89,
                "Şut Gücü": 86
            }, 
            isEpic: false 
        };

        const cardHtml = `
            <div class="card" id="${id}" onclick="openStats('${id}')">
                <div class="rating-top" id="rate-${id}">${players[id].rating}</div>
                <img src="https://via.placeholder.com/160x200/111/ffd700?text=${name}" class="player-img">
                <div class="card-name">${name.toUpperCase()}</div>
            </div>
        `;
        document.getElementById('container').innerHTML += cardHtml;
        document.getElementById('pName').value = "";
    }

    function openStats(id) {
        const p = players[id];
        document.getElementById('modalName').innerText = p.name.toUpperCase();
        const list = document.getElementById('statsList');
        list.innerHTML = "";
        
        for(let s in p.stats) {
            list.innerHTML += `<div class="stat-row"><span>${s}</span><span class="stat-val">${p.stats[s]}</span></div>`;
        }

        document.getElementById('statsPanel').style.display = 'flex';
        document.getElementById('specialBtn').onclick = () => makeEpic(id);
    }

    function makeEpic(id) {
        const p = players[id];
        p.isEpic = true;
        p.rating = 110;
        for(let s in p.stats) { p.stats[s] = 110; } // Tüm istatistikleri fulle!
        
        document.getElementById(id).classList.add('epic');
        document.getElementById('rate-' + id).innerText = "110";
        closeStats();
        // Videodaki gibi özel bir mesaj
        alert(p.name + " için kendine özgün Özel Basım Tamamlandı! 🔥 Reyting: 110. Tüm istatistikler fullendi.");
    }

    function closeStats() { document.getElementById('statsPanel').style.display = 'none'; }
</script>

</body>
</html>
