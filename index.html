<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix AI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #ffffff; color: #111111; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px 20px 90px 20px; }

        .header h1 { font-size: 28px; font-weight: 800; color: #111; letter-spacing: -0.5px; text-align: center; }
        .header p { color: #666; font-size: 13px; margin-top: 2px; text-align: center; }

        .calling-screen { display: none; background: #ffe3e3; border: 1px solid #ff4a4a; color: #d60000; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; margin: 15px 0; text-align: center; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .display-area { flex: 1; background: #f7f9fa; border: 1px solid #e1e8ed; border-radius: 16px; padding: 20px; margin: 20px 0; text-align: left; display: flex; flex-direction: column; justify-content: center; gap: 10px; overflow-y: auto; }
        .status { font-size: 12px; font-weight: bold; color: #007aff; text-transform: uppercase; letter-spacing: 0.5px; }
        .transcript { font-size: 15px; color: #555; font-style: italic; }
        .ai-response { font-size: 18px; color: #111; font-weight: 600; line-height: 1.4; }

        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 1px solid #e1e8ed; padding: 15px; z-index: 100; display: flex; gap: 10px; align-items: center; }
        .mic-circle-btn { width: 46px; height: 46px; background: #007aff; color: white; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .mic-circle-btn.listening { background: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .input-box { flex: 1; display: flex; background: #f1f3f4; border-radius: 24px; padding: 4px 6px 4px 15px; align-items: center; }
        .input-box input { flex: 1; background: transparent; border: none; outline: none; color: #111; font-size: 15px; height: 38px; }
        .input-box button { background: #007aff; color: white; border: none; padding: 0 18px; height: 34px; border-radius: 17px; font-size: 13px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matrix AI</h1>
        <p>Kişisel Sesli & Yazılı Asistan Sistemi</p>
    </div>

    <div class="calling-screen" id="callingScreen">📞 BAĞLANTI KURULUYOR...</div>

    <div class="display-area">
        <div class="status" id="statusText">Sistem Durumu: Çevrimiçi</div>
        <div class="transcript" id="userSpeech">"Komutun veya sorun burada çözümlenecek..."</div>
        <div class="ai-response" id="aiReply">Matrix AI aktif Baran. İstediğin tüm uygulamaları doğrudan açabilirim ve sordun her soruya anında canlı cevap üretebilirim. Dinliyorum şef.</div>
    </div>

    <div class="bottom-panel">
        <button class="mic-circle-btn" id="micBtn" onclick="startListening()">🎤</button>
        <div class="input-box">
            <input type="text" id="textInput" placeholder="Matrix'e bir emir ver veya soru sor..." onkeypress="handleKeyPress(event)">
            <button onclick="processTextInput()">Gönder</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.onstart = () => {
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('statusText').innerText = "Matrix: Dinliyor...";
            };
            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('statusText').innerText = "Matrix: Çevrimiçi";
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userSpeech').innerText = `"${text}"`;
                executeMatrixCore(text.toLowerCase().trim());
            };
        }
        function startListening() { if (recognition) recognition.start(); }

        function handleKeyPress(e) { if (e.key === 'Enter') processTextInput(); }
        function processTextInput() {
            const inputElem = document.getElementById('textInput');
            const text = inputElem.value.trim();
            if (text === "") return;
            document.getElementById('userSpeech').innerText = `(Yazılı) "${text}"`;
            executeMatrixCore(text.toLowerCase().trim());
            inputElem.value = "";
        }

        // TELEFONDAKİ UYGULAMALARI DOĞRUDAN TETİKLEYEN DERİN BAĞLANTI MOTORU
        function launchDirectApp(appName) {
            let reply = `${appName.toUpperCase()} uygulaması doğrudan telefondan başlatılıyor Baran.`;
            document.getElementById('aiReply').innerText = reply;
            speak(reply);

            setTimeout(() => {
                if (appName.includes("instagram")) {
                    // Instagram uygulamasını telefondan direkt uyandıran derin android bağı
                    window.location.href = "intent://instagram.com/#Intent;package=com.instagram.android;scheme=https;end";
                } else if (appName.includes("tiktok")) {
                    window.location.href = "intent://tiktok.com/#Intent;package=com.zhiliaoapp.musically;scheme=https;end";
                } else if (appName.includes("youtube")) {
                    window.location.href = "intent://youtube.com/#Intent;package=com.google.android.youtube;scheme=https;end";
                } else if (appName.includes("pubg")) {
                    window.location.href = "android-app://com.tencent.ig";
                } else if (appName.includes("facebook")) {
                    window.location.href = "intent://facebook.com/#Intent;package=com.facebook.katana;scheme=https;end";
                } else if (appName.includes("spotify")) {
                    window.location.href = "intent://open.spotify.com/#Intent;package=com.spotify.music;scheme=https;end";
                } else if (appName.includes("whatsapp")) {
                    window.location.href = "intent://whatsapp.com/#Intent;package=com.whatsapp;scheme=https;end";
                } else {
                    // Diğer uygulamalar için genel standart tarayıcı dışı sistem tetiklemesi
                    window.location.href = `intent://${appName}.com/#Intent;package=com.${appName};scheme=https;end`;
                }
            }, 1000);
        }

        // CANLI CEVAP VE ARAMA MOTORU INTEGRASYONU
        function executeMatrixCore(cmd) {
            // Uygulama açma kontrolü
            if (cmd.endsWith("aç") || cmd.includes("aç ") || cmd.startsWith("aç")) {
                let appName = cmd.replace("aç", "").replace("uygulamasını", "").replace("uygulaması", "").trim();
                if (appName !== "") {
                    launchDirectApp(appName);
                    return;
                }
            }

            // Temel sabit komutlar
            if (cmd.includes("nasılsın")) {
                let reply = "Çok iyiyim Baran! Tüm logoları kaldırdım, sistemi tamamen hızlandırdım. Emrindeyim şef.";
                document.getElementById('aiReply').innerText = reply; speak(reply); return;
            }
            if (cmd.includes("baran kim") || cmd.includes("ben kimim")) {
                let reply = "Sen bu Matrix yazılımının kurucusu ve komutanı Baran Pro'sun.";
                document.getElementById('aiReply').innerText = reply; speak(reply); return;
            }

            // CANLI SORULAR İÇİN (ÇEYREK ALTIN VB.) KESİNTİSİZ WEB SORGULAMA BEYNİ
            document.getElementById('statusText').innerText = "Matrix: Düşünüyor...";
            document.getElementById('aiReply').innerText = "Canlı veritabanı sorgulanıyor, anında cevap getiriyorum Baran...";
            
            // Google veya canlı veri çekme servislerine yönlenen ve asla donmayan akıllı fallback sistemi
            setTimeout(() => {
                let searchUrl = `https://www.google.com/search?q=${encodeURIComponent(cmd)}`;
                document.getElementById('statusText').innerText = "Matrix: Cevap Bulundu";
                
                if (cmd.includes("altın") || cmd.includes("çeyrek") || cmd.includes("dolar") || cmd.includes("fiyat")) {
                    let replyText = `"${cmd.toUpperCase()}" için canlı piyasa verilerini ve anlık fiyat grafiklerini senin için ekrana getiriyorum Baran şef.`;
                    document.getElementById('aiReply').innerText = replyText;
                    speak(replyText);
                    setTimeout(() => { window.location.href = searchUrl; }, 1500);
                } else {
                    let replyText = `"${cmd}" sorunu genel bilgi ağı üzerinde sorguladım Baran. Detaylı bilgileri anında ekrana yansıtıyorum.`;
                    document.getElementById('aiReply').innerText = replyText;
                    speak(replyText);
                    setTimeout(() => { window.location.href = searchUrl; }, 1500);
                }
            }, 1200);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Önceki sesleri kes
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
